<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cuadrilla – COSTACON</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <header class="app-header">
    <h1>COSTACON – Mi Cuadrilla</h1>
    <div class="user-info">
      <span id="nombre-usuario"></span>
      <a href="/jefe/mis-tareas.html" style="color:#fff;font-size:12px;">← Mis Tareas</a>
      <button class="btn-logout" id="btn-logout">Salir</button>
    </div>
  </header>

  <div class="app-container">

    <div class="card">
      <h2>Agregar empleado</h2>
      <form id="form-empleado" class="form-grid">
        <div>
          <label># Empleado</label>
          <input type="text" id="emp-numero" required placeholder="Ej: 101">
        </div>
        <div>
          <label>Nombre completo</label>
          <input type="text" id="emp-nombre" required placeholder="Nombre y apellidos">
        </div>
        <div>
          <label>Rol habitual</label>
          <select id="emp-rol" required style="padding:10px;border:1.5px solid #C0CCD8;border-radius:6px;margin-top:4px;">
            <option value="Operario">Operario</option>
            <option value="Ayudante">Ayudante</option>
          </select>
        </div>
        <div style="display:flex; align-items:flex-end;">
          <button type="submit" class="btn-accion" style="width:100%;">+ Agregar a mi cuadrilla</button>
        </div>
      </form>
      <p class="error-msg" id="form-error"></p>
    </div>

    <div class="card">
      <h2>Mi cuadrilla actual</h2>
      <table id="tabla-empleados">
        <thead>
          <tr>
            <th># Empleado</th><th>Nombre</th><th>Rol</th><th>Estado</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody-empleados"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none;">
        Aún no has agregado empleados a tu cuadrilla.
      </div>
    </div>

  </div>

  <script type="module" src="/jefe/mi-cuadrilla-controller.js"></script>
</body>
</html>
