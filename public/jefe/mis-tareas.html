<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Tareas – COSTACON</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <header class="app-header">
    <h1>COSTACON – Mis Tareas Asignadas</h1>
    <div class="user-info">
      <span id="nombre-usuario"></span>
      <a href="/jefe/mi-cuadrilla.html" style="color:#fff;font-size:12px;">Mi Cuadrilla →</a>
      <button class="btn-logout" id="btn-logout">Salir</button>
    </div>
  </header>

  <div class="app-container">
    <div class="card">
      <h2>Tareas donde soy Jefe de Cuadrilla</h2>
      <table>
        <thead>
          <tr>
            <th>Proyecto</th><th>Actividad</th><th>OT #</th>
            <th>HH Estimadas</th><th>Estado</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody-tareas"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none;">
        No tienes tareas asignadas todavía.
      </div>
    </div>
  </div>

  <script type="module" src="/jefe/mis-tareas-controller.js"></script>
</body>
</html>
