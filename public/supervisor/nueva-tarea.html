<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva Tarea – COSTACON</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <header class="app-header">
    <h1>COSTACON – Nueva Tarea</h1>
    <div class="user-info">
      <span id="nombre-usuario"></span>
      <button class="btn-logout" id="btn-logout">Salir</button>
    </div>
  </header>

  <div class="app-container">
    <div class="card">
      <h2>Datos de la tarea (frente del ticket)</h2>
      <form id="form-tarea" class="form-grid">

        <div>
          <label>Proyecto</label>
          <select id="tarea-proyecto" required></select>
        </div>
        <div>
          <label>OT #</label>
          <input type="text" id="tarea-ot">
        </div>

        <div class="full">
          <label>Actividad</label>
          <input type="text" id="tarea-actividad" required>
        </div>

        <div>
          <label># Actividad</label>
          <input type="text" id="tarea-numero-actividad">
        </div>
        <div>
          <label>Cantidad</label>
          <input type="number" id="tarea-cantidad" step="0.01">
        </div>
        <div>
          <label>Unidad</label>
          <input type="text" id="tarea-unidad" placeholder="m2, m3, ml...">
        </div>
        <div>
          <label>Tamaño de cuadrilla</label>
          <input type="number" id="tarea-tamano-cuadrilla">
        </div>

        <div>
          <label>Jefe de Cuadrilla</label>
          <select id="tarea-jefe" required></select>
        </div>
        <div>
          <label>HH Estimadas</label>
          <input type="number" id="tarea-hh-estimadas" required step="0.5">
        </div>

        <div>
          <label>Costo estimado de la actividad (₡)</label>
          <input type="number" id="tarea-costo-estimado" step="1">
        </div>
        <div>
          <label>Fecha de inicio</label>
          <input type="date" id="tarea-fecha-inicio" required>
        </div>

        <div class="full">
          <button type="submit" class="btn-accion">Crear Tarea</button>
        </div>
      </form>
      <p class="error-msg" id="form-error"></p>
    </div>
  </div>

  <script type="module" src="/supervisor/nueva-tarea-controller.js"></script>
</body>
</html>
