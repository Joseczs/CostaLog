<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionar Empleados – COSTACON</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <header class="app-header">
    <h1>COSTACON – Gestionar Empleados</h1>
    <div class="user-info">
      <span id="nombre-usuario"></span>
      <button class="btn-logout" id="btn-logout">Salir</button>
    </div>
  </header>

  <div class="app-container">

    <div class="card">
      <h2>Seleccionar Jefe de Cuadrilla</h2>
      <select id="selector-jefe" style="width:100%;max-width:400px;">
        <option value="">Selecciona un Jefe...</option>
      </select>
    </div>

    <div id="seccion-empleados" style="display:none;">

      <div class="card">
        <h2>Agregar empleado a esta cuadrilla</h2>
        <form id="form-empleado" class="form-grid">
          <div>
            <label># Empleado</label>
            <input type="text" id="emp-numero" required placeholder="Ej: 101">
          </div>
          <div>
            <label>Nombre completo</label>
            <input type="text" id="emp-nombre" required placeholder="Nombre y apellidos">
          </div>
          <div>
            <label>Rol habitual</label>
            <select id="emp-rol" required>
              <option value="Operario">Operario</option>
              <option value="Ayudante">Ayudante</option>
            </select>
          </div>
          <div style="display:flex; align-items:flex-end;">
            <button type="submit" class="btn-accion" style="width:100%;">+ Agregar a la cuadrilla</button>
          </div>
        </form>
        <p class="error-msg" id="form-error"></p>
      </div>

      <div class="card">
        <h2>Cuadrilla de <span id="nombre-jefe-seleccionado"></span></h2>
        <table>
          <thead>
            <tr><th># Empleado</th><th>Nombre</th><th>Rol</th><th>Estado</th><th></th></tr>
          </thead>
          <tbody id="tbody-empleados"></tbody>
        </table>
        <div id="empty-state" class="empty-state" style="display:none;">
          Este Jefe todavía no tiene empleados asignados.
        </div>
      </div>

    </div>

  </div>

  <script type="module" src="/supervisor/gestionar-empleados-controller.js"></script>
</body>
</html>
